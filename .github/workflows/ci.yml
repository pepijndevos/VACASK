name: CI

on:
  push:
    branches: [main]
    tags: ['_*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: Ubuntu 24.04
          - os: macos-14
            name: macOS
          - os: windows-latest
            name: Windows

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: ci/install-deps.sh

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: ci/install-deps.sh

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: git bison flex
          pacboy: >-
            gcc:p cmake:p ninja:p boost:p suitesparse:p
            tomlplusplus:p llvm:p clang:p lld:p rust:p python:p
            python-numpy:p python-scipy:p

      - name: Cache OpenVAF build
        id: cache-openvaf
        uses: actions/cache@v5
        with:
          path: openvaf-cache
          key: openvaf-${{ matrix.os }}-${{ runner.arch }}-v5

      - name: Build OpenVAF-reloaded (Unix)
        if: steps.cache-openvaf.outputs.cache-hit != 'true' && runner.os != 'Windows'
        run: ci/build-openvaf.sh "$GITHUB_WORKSPACE/openvaf-cache"

      - name: Build OpenVAF-reloaded (Windows)
        if: steps.cache-openvaf.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: msys2 {0}
        run: ci/build-openvaf.sh "$(cygpath -u "$GITHUB_WORKSPACE")/openvaf-cache"

      - name: Setup OpenVAF path (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x "$GITHUB_WORKSPACE/openvaf-cache/openvaf-r"
          echo "OPENVAF_DIR=$GITHUB_WORKSPACE/openvaf-cache" >> "$GITHUB_ENV"

      - name: Setup OpenVAF path (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          echo "OPENVAF_DIR=$(cygpath -u "$GITHUB_WORKSPACE")/openvaf-cache" >> "$GITHUB_ENV"

      - name: Build and test (Unix)
        if: runner.os != 'Windows'
        run: ci/build-vacask.sh --openvaf-dir "$OPENVAF_DIR"

      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: ci/build-vacask.sh --openvaf-dir "$OPENVAF_DIR"

      - name: Bundle shared libraries (Unix)
        if: runner.os != 'Windows'
        run: ci/bundle.sh --openvaf-dir "$OPENVAF_DIR"

      - name: Bundle shared libraries (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: ci/bundle.sh --openvaf-dir "$OPENVAF_DIR"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: vacask-${{ matrix.os }}
          path: |
            build/simulator/
            build/lib/vacask/
          if-no-files-found: warn

  release:
    if: startsWith(github.ref, 'refs/tags/_')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Package release archives
        run: |
          VERSION="${GITHUB_REF_NAME#_}"
          echo "Version: $VERSION"

          cd artifacts

          # Linux tar.gz
          tar czf "../vacask_${VERSION}_linux-x86_64.tar.gz" -C vacask-ubuntu-24.04 .

          # macOS tar.gz
          tar czf "../vacask_${VERSION}_darwin-arm64.tar.gz" -C vacask-macos-14 .

          # Windows zip
          cd vacask-windows-latest
          zip -r "../../vacask_${VERSION}_windows-x86_64.zip" .
          cd ..

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: VACASK ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            vacask_*.tar.gz
            vacask_*.zip
